services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sentiment_backend
    ports:
      - '8000:8000'
    environment:
      - MLFLOW_TRACKING_URI=http://sentiment_mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./data/baseline:/app/data/baseline
      - ./predictions.db:/app/predictions.db
      - ./data/processed:/app/data/processed
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/health")']
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
  
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: sentiment_frontend
    ports:
      - '3001:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: sentiment_mlflow
    ports:
      - '5000:5000'
    volumes:
      - ./models:/app/models
    command: >
      mlflow server 
      --host 0.0.0.0 
      --port 5000
      --allowed-hosts "*"
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:5000/")']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
  
  prometheus:
    image: prom/prometheus:latest
    container_name: sentiment_prometheus
    volumes: 
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - '9090:9090'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: sentiment_grafana
    ports:
      - '3000:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=sandbox.smtp.mailtrap.io:2525
      - GF_SMTP_USER=329fae7afdcd4d
      - GF_SMTP_PASSWORD=7ff38381b52907
      - GF_SMTP_FROM_ADDRESS=grafana@sentiment_dashboard.com
      - GF_SMTP_FROM_NAME=Sentiment Dashboard
      - GF_SMTP_SKIP_VERIFY=true
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana.ini:/etc/grafana/grafana.ini
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    restart: unless-stopped
  
volumes:
  grafana_data: